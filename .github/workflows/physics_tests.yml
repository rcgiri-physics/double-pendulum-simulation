name: Physics Validation Pipeline

on:
  push:
    branches: [ main, feat/lagrangian-derivation ]
  pull_request:
    branches: [ main ]

jobs:
  validate-mechanics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scientific Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Energy Conservation Suite
        run: |
          python -m pytest -v -s tests/test_mechanics.py